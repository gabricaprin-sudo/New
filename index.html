<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#0a0e1a">
<title>PharmaSys Pro - نظام إدارة الصيدلية</title>
<script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;800;900&family=JetBrains+Mono:wght@400;600&display=swap');
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  :root {
    --bg-primary: #0a0e1a;
    --bg-secondary: #111827;
    --bg-card: #141b2d;
    --bg-hover: #1a2640;
    --border: #1e2d45;
    --border-light: #243550;
    --accent: #00d4aa;
    --accent-dim: #00d4aa22;
    --accent-glow: #00d4aa44;
    --blue: #3b82f6;
    --blue-dim: #3b82f622;
    --amber: #f59e0b;
    --amber-dim: #f59e0b22;
    --red: #ef4444;
    --red-dim: #ef444422;
    --green: #22c55e;
    --green-dim: #22c55e22;
    --purple: #a855f7;
    --purple-dim: #a855f722;
    --text-primary: #e2e8f0;
    --text-secondary: #8b9dc3;
    --text-muted: #4a6080;
    --sidebar-w: 260px;
    --radius: 12px;
    --radius-sm: 8px;
    --shadow: 0 4px 24px rgba(0,0,0,0.4);
  }
  html { font-size: 14px; direction: rtl; scroll-behavior: smooth; }
  body { font-family: 'Tajawal', sans-serif; background: var(--bg-primary); color: var(--text-primary); min-height: 100vh; overflow-x: hidden; -webkit-font-smoothing: antialiased; word-wrap: break-word; overflow-wrap: break-word; }
  * { min-width: 0; }
  ::-webkit-scrollbar { width: 5px; height: 5px; }
  ::-webkit-scrollbar-track { background: var(--bg-primary); }
  ::-webkit-scrollbar-thumb { background: var(--border-light); border-radius: 3px; }
  ::-webkit-scrollbar-thumb:hover { background: var(--accent); }
  .app { display: flex; min-height: 100vh; }

  /* ===== SIDEBAR ===== */
  .sidebar {
    width: var(--sidebar-w);
    background: var(--bg-secondary);
    border-left: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    position: fixed;
    top: 0; right: 0; bottom: 0;
    z-index: 100;
    transition: transform 0.35s cubic-bezier(0.4,0,0.2,1);
    box-shadow: -4px 0 24px rgba(0,0,0,0.3);
  }
  .sidebar.closed { transform: translateX(var(--sidebar-w)); }
  .sidebar-logo {
    padding: 18px 16px;
    border-bottom: 1px solid var(--border);
    display: flex; align-items: center; gap: 12px;
  }
  .logo-icon {
    width: 40px; height: 40px;
    background: linear-gradient(135deg, var(--accent), #0099cc);
    border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    font-size: 20px; font-weight: 900; color: #000;
    box-shadow: 0 0 20px var(--accent-glow);
    flex-shrink: 0;
  }
  .logo-text { font-size: 15px; font-weight: 800; color: var(--text-primary); line-height: 1.2; }
  .logo-sub { font-size: 11px; color: var(--accent); font-weight: 500; }
  .sidebar-nav { flex: 1; overflow-y: auto; padding: 8px; -webkit-overflow-scrolling: touch; }
  .nav-section { margin-bottom: 4px; }
  .nav-section-label { font-size: 10px; font-weight: 700; color: var(--text-muted); text-transform: uppercase; letter-spacing: 1px; padding: 12px 12px 6px; }
  .nav-item {
    display: flex; align-items: center; gap: 10px;
    padding: 11px 12px; border-radius: var(--radius-sm);
    cursor: pointer; color: var(--text-secondary);
    font-size: 13px; font-weight: 500;
    transition: all 0.15s; position: relative;
    margin-bottom: 2px; min-height: 44px;
  }
  .nav-item:hover { background: var(--bg-hover); color: var(--text-primary); }
  .nav-item:active { transform: scale(0.98); }
  .nav-item.active { background: var(--accent-dim); color: var(--accent); }
  .nav-item.active::before { content: ''; position: absolute; right: 0; top: 20%; bottom: 20%; width: 3px; background: var(--accent); border-radius: 2px 0 0 2px; }
  .nav-badge {
    margin-right: auto; font-size: 10px; font-weight: 700;
    background: var(--red); color: white;
    padding: 1px 6px; border-radius: 10px;
  }

  /* ===== MAIN ===== */
  .main { margin-right: var(--sidebar-w); flex: 1; display: flex; flex-direction: column; min-width: 0; transition: margin-right 0.35s; }

  /* ===== TOPBAR ===== */
  .topbar {
    height: 56px;
    background: var(--bg-secondary);
    border-bottom: 1px solid var(--border);
    display: flex; align-items: center;
    padding: 0 16px; gap: 10px;
    position: sticky; top: 0; z-index: 50;
  }
  .menu-btn {
    display: none;
    background: none; border: none;
    color: var(--text-secondary); cursor: pointer;
    padding: 8px; border-radius: 8px;
    min-width: 40px; min-height: 40px;
    align-items: center; justify-content: center;
  }
  .menu-btn:active { background: var(--bg-hover); }
  .page-title { font-size: 15px; font-weight: 700; color: var(--text-primary); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .topbar-actions { margin-right: auto; display: flex; align-items: center; gap: 6px; }
  .search-bar {
    display: flex; align-items: center; gap: 8px;
    background: var(--bg-card); border: 1px solid var(--border);
    border-radius: var(--radius-sm); padding: 6px 10px;
    color: var(--text-secondary); font-family: 'Tajawal', sans-serif;
    transition: all 0.2s;
  }
  .search-bar:focus-within { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-dim); }
  .search-bar input { background: none; border: none; outline: none; color: var(--text-primary); font-family: inherit; font-size: 13px; width: 160px; }
  .search-bar input::placeholder { color: var(--text-muted); }
  .user-info { display: flex; align-items: center; gap: 8px; padding: 5px 8px; border-radius: var(--radius-sm); background: var(--bg-card); cursor: pointer; }
  .user-avatar { width: 28px; height: 28px; border-radius: 50%; background: var(--accent-dim); border: 2px solid var(--accent); display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 700; color: var(--accent); flex-shrink: 0; }
  .user-name { font-size: 12px; font-weight: 600; color: var(--text-secondary); }

  /* ===== PAGE CONTENT ===== */
  .page-content { padding: 16px; flex: 1; overflow-x: hidden; }

  /* ===== CARDS ===== */
  .card { background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius); padding: 16px; min-width: 0; overflow: hidden; }
  .card-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; gap: 8px; flex-wrap: wrap; min-width: 0; }
  .card-title { font-size: 15px; font-weight: 700; color: var(--text-primary); }
  .card-subtitle { font-size: 12px; color: var(--text-muted); margin-top: 2px; }

  /* ===== STAT CARDS ===== */
  .stats-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 14px; margin-bottom: 18px; }
  .stat-card {
    background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius);
    padding: 18px; position: relative; overflow: hidden;
    transition: transform 0.2s, border-color 0.2s;
    min-width: 0; display: flex; flex-direction: column;
  }
  .stat-card:hover { transform: translateY(-2px); border-color: var(--border-light); }
  .stat-card::before { content: ''; position: absolute; top: 0; right: 0; width: 100%; height: 2px; }
  .stat-card.green::before { background: var(--green); }
  .stat-card.blue::before { background: var(--blue); }
  .stat-card.amber::before { background: var(--amber); }
  .stat-card.red::before { background: var(--red); }
  .stat-card.purple::before { background: var(--purple); }
  .stat-card.accent::before { background: var(--accent); }
  .stat-label { font-size: 12px; color: var(--text-secondary); font-weight: 500; margin-bottom: 8px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .stat-value { font-size: 22px; font-weight: 800; color: var(--text-primary); line-height: 1; word-break: break-word; }
  .stat-value.mono { font-family: 'JetBrains Mono', monospace; font-size: 18px; }
  .stat-change { font-size: 11px; margin-top: 6px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .stat-icon { position: absolute; left: 14px; top: 50%; transform: translateY(-50%); opacity: 0.12; pointer-events: none; }
  .green .stat-icon { color: var(--green); }
  .blue .stat-icon { color: var(--blue); }
  .amber .stat-icon { color: var(--amber); }
  .red .stat-icon { color: var(--red); }
  .accent .stat-icon { color: var(--accent); }

  /* ===== TABLE ===== */
  .table-wrap { overflow-x: auto; margin: 0 -4px; padding: 0 4px; -webkit-overflow-scrolling: touch; width: 100%; }
  table { width: 100%; border-collapse: collapse; font-size: 13px; min-width: 600px; }
  thead th { background: var(--bg-hover); color: var(--text-secondary); font-weight: 600; padding: 10px 12px; text-align: right; font-size: 12px; white-space: nowrap; }
  thead th:first-child { border-radius: 0 var(--radius-sm) var(--radius-sm) 0; }
  thead th:last-child { border-radius: var(--radius-sm) 0 0 var(--radius-sm); }
  tbody tr { border-bottom: 1px solid var(--border); transition: background 0.1s; }
  tbody tr:hover { background: var(--bg-hover); }
  tbody td { padding: 10px 12px; color: var(--text-primary); white-space: nowrap; max-width: 300px; overflow: hidden; text-overflow: ellipsis; }
  .mono-cell { font-family: 'JetBrains Mono', monospace; font-size: 12px; }

  /* ===== BADGES ===== */
  .badge {
    display: inline-flex; align-items: center; gap: 4px;
    padding: 3px 10px; border-radius: 20px; font-size: 11px; font-weight: 600;
  }
  .badge-green { background: var(--green-dim); color: var(--green); }
  .badge-red { background: var(--red-dim); color: var(--red); }
  .badge-amber { background: var(--amber-dim); color: var(--amber); }
  .badge-blue { background: var(--blue-dim); color: var(--blue); }
  .badge-purple { background: var(--purple-dim); color: var(--purple); }
  .badge-accent { background: var(--accent-dim); color: var(--accent); }
  .badge-gray { background: rgba(255,255,255,0.05); color: var(--text-secondary); }

  /* ===== BUTTONS ===== */
  .btn {
    display: inline-flex; align-items: center; justify-content: center; gap: 6px;
    padding: 8px 14px; border-radius: var(--radius-sm);
    font-family: 'Tajawal', sans-serif; font-size: 13px; font-weight: 600;
    cursor: pointer; border: none; transition: all 0.15s;
    white-space: nowrap; min-height: 36px;
    touch-action: manipulation;
  }
  .btn:disabled { opacity: 0.5; cursor: not-allowed; }
  .btn:active { transform: scale(0.97); }
  .btn-primary { background: var(--accent); color: #000; }
  .btn-primary:hover:not(:disabled) { background: #00f0c0; box-shadow: 0 0 20px var(--accent-glow); }
  .btn-secondary { background: var(--bg-hover); color: var(--text-primary); border: 1px solid var(--border); }
  .btn-secondary:hover:not(:disabled) { border-color: var(--border-light); background: var(--border); }
  .btn-danger { background: var(--red-dim); color: var(--red); border: 1px solid var(--red-dim); }
  .btn-danger:hover:not(:disabled) { background: var(--red); color: white; }
  .btn-icon { padding: 7px; width: 36px; height: 36px; justify-content: center; }
  .btn-sm { padding: 5px 10px; font-size: 12px; min-height: 30px; }

  /* ===== FORM ===== */
  .form-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 12px; }
  .form-group { display: flex; flex-direction: column; gap: 5px; }
  .form-group.full { grid-column: 1 / -1; }
  label { font-size: 12px; font-weight: 600; color: var(--text-secondary); }
  input, select, textarea {
    background: var(--bg-primary); border: 1px solid var(--border);
    border-radius: var(--radius-sm); padding: 9px 12px;
    color: var(--text-primary); font-family: 'Tajawal', sans-serif; font-size: 13px;
    outline: none; transition: border-color 0.15s, box-shadow 0.15s; width: 100%;
    direction: rtl; min-height: 40px;
  }
  input:focus, select:focus, textarea:focus { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-dim); }
  input[type="number"] { font-family: 'JetBrains Mono', monospace; }
  select option { background: var(--bg-card); }

  /* ===== MODAL ===== */
  .modal-overlay {
    position: fixed; inset: 0; background: rgba(0,0,0,0.75);
    z-index: 200; display: flex; align-items: center; justify-content: center; padding: 16px;
    backdrop-filter: blur(6px);
    animation: fadeIn 0.15s;
  }
  .modal {
    background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius);
    width: 100%; max-width: 700px; max-height: 90vh; display: flex; flex-direction: column;
    box-shadow: 0 20px 60px rgba(0,0,0,0.6);
    animation: slideUp 0.25s cubic-bezier(0.34,1.56,0.64,1);
  }
  .modal.modal-sm { max-width: 440px; }
  .modal.modal-lg { max-width: 900px; }
  .modal.modal-xl { max-width: 1100px; }
  .modal-header { display: flex; align-items: center; justify-content: space-between; padding: 14px 18px; border-bottom: 1px solid var(--border); gap: 8px; }
  .modal-title { font-size: 15px; font-weight: 700; }
  .modal-body { padding: 16px; overflow-y: auto; flex: 1; -webkit-overflow-scrolling: touch; }
  .modal-footer { padding: 12px 18px; border-top: 1px solid var(--border); display: flex; gap: 8px; justify-content: flex-end; flex-wrap: wrap; }

  /* ===== INVOICE ===== */
  .invoice-items-header { display: grid; grid-template-columns: 2fr 1fr 1fr 1fr 1fr 40px; gap: 6px; padding: 8px 10px; background: var(--bg-hover); border-radius: var(--radius-sm); font-size: 11px; font-weight: 700; color: var(--text-muted); margin-bottom: 8px; }
  .invoice-item-row { display: grid; grid-template-columns: 2fr 1fr 1fr 1fr 1fr 40px; gap: 6px; align-items: center; padding: 4px 0; }
  .invoice-total-section { background: var(--bg-hover); border-radius: var(--radius-sm); padding: 14px; margin-top: 12px; }
  .total-row { display: flex; justify-content: space-between; align-items: center; padding: 4px 0; font-size: 13px; }
  .total-row.grand { font-size: 16px; font-weight: 800; color: var(--accent); border-top: 1px solid var(--border); padding-top: 10px; margin-top: 6px; }

  /* ===== ALERTS ===== */
  .alert { display: flex; align-items: flex-start; gap: 10px; padding: 12px 14px; border-radius: var(--radius-sm); font-size: 13px; word-break: break-word; }
  .alert-warning { background: var(--amber-dim); border: 1px solid var(--amber); color: var(--amber); }
  .alert-danger { background: var(--red-dim); border: 1px solid var(--red); color: var(--red); }
  .alert-success { background: var(--green-dim); border: 1px solid var(--green); color: var(--green); }

  /* ===== TABS ===== */
  .tabs { display: flex; gap: 4px; background: var(--bg-hover); border-radius: var(--radius-sm); padding: 4px; margin-bottom: 18px; overflow-x: auto; -webkit-overflow-scrolling: touch; }
  .tab { flex: 1; text-align: center; padding: 8px 12px; border-radius: 6px; font-size: 13px; font-weight: 600; cursor: pointer; color: var(--text-secondary); transition: all 0.15s; white-space: nowrap; min-width: 100px; }
  .tab.active { background: var(--bg-card); color: var(--accent); box-shadow: 0 2px 8px rgba(0,0,0,0.3); }

  /* ===== PAGINATION ===== */
  .pagination { display: flex; align-items: center; gap: 6px; justify-content: center; margin-top: 16px; }
  .page-btn { width: 34px; height: 34px; border-radius: var(--radius-sm); background: var(--bg-hover); border: 1px solid var(--border); color: var(--text-secondary); cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 600; transition: all 0.15s; }
  .page-btn:hover { border-color: var(--accent); color: var(--accent); }
  .page-btn.active { background: var(--accent); color: #000; border-color: var(--accent); }

  /* ===== OVERLAYS ===== */
  .overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 90; }

  /* ===== EMPTY STATE ===== */
  .empty-state { text-align: center; padding: 50px 20px; color: var(--text-muted); }
  .empty-state svg { margin: 0 auto 16px; opacity: 0.3; }
  .empty-state p { font-size: 14px; }

  /* ===== GRID LAYOUTS ===== */
  .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
  .grid-2 > * { min-width: 0; overflow: hidden; }
  .grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 14px; }
  .grid-3 > * { min-width: 0; overflow: hidden; }
  .flex-row { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; min-width: 0; }
  .flex-between { display: flex; align-items: center; justify-content: space-between; }
  .gap-8 { gap: 8px; }
  .mb-16 { margin-bottom: 16px; }
  .mb-20 { margin-bottom: 20px; }

  /* ===== TOAST ===== */
  .toast-container { position: fixed; bottom: 16px; left: 16px; right: 16px; z-index: 9999; display: flex; flex-direction: column; gap: 8px; align-items: flex-start; }
  .toast {
    display: flex; align-items: center; gap: 10px;
    padding: 12px 16px; border-radius: var(--radius-sm);
    font-size: 13px; font-weight: 600;
    box-shadow: var(--shadow);
    animation: slideInLeft 0.3s cubic-bezier(0.34,1.56,0.64,1);
    min-width: 250px; max-width: 100%;
  }
  .toast-success { background: var(--green); color: #000; }
  .toast-error { background: var(--red); color: white; }
  .toast-info { background: var(--blue); color: white; }

  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
  @keyframes slideUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
  @keyframes slideInLeft { from { transform: translateX(-20px); opacity: 0; } to { transform: translateX(0); opacity: 1; } }

  /* ===== TABLET (max-width: 1024px) ===== */
  @media (max-width: 1024px) {
    .stats-grid { grid-template-columns: repeat(3, 1fr); }
    .grid-3 { grid-template-columns: repeat(2, 1fr); }
  }

  /* ===== MOBILE (max-width: 768px) ===== */
  @media (max-width: 768px) {
    :root { --sidebar-w: 280px; }
    .sidebar { transform: translateX(var(--sidebar-w)); box-shadow: -8px 0 40px rgba(0,0,0,0.6); }
    .sidebar.open { transform: translateX(0); }
    .main { margin-right: 0; }
    .menu-btn { display: flex; }
    .overlay { display: block; }
    .page-title { font-size: 14px; max-width: 140px; }
    .user-name { display: none; }
    .search-bar { padding: 5px 8px; }
    .search-bar input { width: 100px; font-size: 12px; }
    .stats-grid { grid-template-columns: repeat(2, 1fr); gap: 10px; margin-bottom: 14px; }
    .stat-card { padding: 14px 12px; }
    .stat-value { font-size: 17px; }
    .stat-value.mono { font-size: 14px; }
    .stat-label { font-size: 11px; }
    .stat-change { font-size: 10px; }
    .stat-icon { display: none; }
    .card { padding: 14px; border-radius: 10px; }
    .grid-2, .grid-3 { grid-template-columns: 1fr; gap: 12px; }
    .page-content { padding: 12px; }
    .card { padding: 14px; }
    .card-header { margin-bottom: 12px; }
    .table-wrap { margin: 0 -2px; padding: 0 2px; }
    table { font-size: 12px; min-width: 500px; }
    thead th { padding: 8px 10px; font-size: 11px; }
    tbody td { padding: 8px 10px; }
    .btn { padding: 7px 12px; font-size: 12px; min-height: 34px; }
    .btn-icon { width: 34px; height: 34px; }
    .modal { max-height: 95vh; border-radius: var(--radius-sm); }
    .modal-header { padding: 12px 14px; }
    .modal-body { padding: 14px; }
    .modal-footer { padding: 10px 14px; }
    .invoice-items-header, .invoice-item-row { grid-template-columns: 2fr 1fr 1fr 40px; }
    .invoice-items-header span:nth-child(4), .invoice-item-row span:nth-child(4),
    .invoice-items-header span:nth-child(5), .invoice-item-row span:nth-child(5) { display: none; }
    .form-grid { grid-template-columns: 1fr; gap: 10px; }
    .form-group.full { grid-column: 1; }
    .tabs { padding: 3px; }
    .tab { padding: 7px 10px; font-size: 12px; min-width: 80px; }
    .alert { padding: 10px 12px; font-size: 12px; }
    .toast-container { left: 12px; right: 12px; bottom: 12px; align-items: stretch; }
    .toast { min-width: unset; width: 100%; justify-content: center; }
    .hide-mobile { display: none !important; }
  }

  /* ===== SMALL MOBILE (max-width: 480px) ===== */
  @media (max-width: 480px) {
    .stats-grid { grid-template-columns: 1fr; }
    .stat-card { padding: 14px; }
    .stat-value { font-size: 20px; }
    .topbar { padding: 0 10px; height: 52px; }
    .search-bar { display: none; }
    .page-content { padding: 10px; }
    .card { padding: 12px; border-radius: 10px; }
    .card-title { font-size: 14px; }
    .invoice-items-header, .invoice-item-row { grid-template-columns: 2fr 1fr 40px; }
    .invoice-items-header span:nth-child(3), .invoice-item-row span:nth-child(3) { display: none; }
    .modal-overlay { padding: 8px; }
    .modal { border-radius: 10px; }
    .modal-footer { justify-content: stretch; }
    .modal-footer .btn { flex: 1; }
    .table-wrap { margin: 0; padding: 0; }
    table { min-width: 400px; }
    thead th { padding: 7px 8px; }
    tbody td { padding: 7px 8px; }

    get: async function() {
      let data = [...(MOCK_DB[name] || [])];
      this._filters.forEach(f => {
        data = data.filter(d => {
          if(f.op === "==") return d[f.field] === f.val;
          if(f.op === ">=") return d[f.field] >= f.val;
          if(f.op === "<=") return d[f.field] <= f.val;

          return true;
        });
      });

          const av = a[this._sort.field], bv = b[this._sort.field];
          return this._sort.dir === "asc" ? (av > bv ? 1 : -1) : (av < bv ? 1 : -1);
        });
      }
      const limited = data.slice(0, this._limit);
      return { docs: limited.map(d => ({ id: d.id, data: () => d, exists: true })), size: limited.length };

    batch: <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M7 7h.01M7 3h5c.512 0 1.024.195 1.414.586l7 7a2 2 0 010 2.828l-7 7a2 2 0 01-2.828 0l-7-7A1.994 1.994 0 013 12V7a4 4 0 014-4z" />,
  };
  return (
    <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} fill="none" viewBox="0 0 24 24" stroke="currentColor" className={className}>
      {icons[name]}
    </svg>
  );
};

// ============================================================
const formatCurrency = (n) => (n || 0).toLocaleString("ar-EG", { minimumFractionDigits: 2 }) + " ج.م";
const formatDate = (d) => d ? new Date(d).toLocaleDateString("ar-EG") : "-";
const daysUntilExpiry = (dateStr) => {
  if (!dateStr) return 9999;
  return Math.ceil((new Date(dateStr) - new Date()) / (1000 * 60 * 60 * 24));
};

const Dashboard = () => {
  const totalSales = MOCK_DB.sales.reduce((s, i) => s + i.total, 0);
  const totalPurchases = MOCK_DB.purchases.reduce((s, i) => s + i.total, 0);
  const totalExpenses = MOCK_DB.expenses.reduce((s, i) => s + i.amount, 0);
  const totalCostOfSales = MOCK_DB.sales.reduce((s, inv) => s + inv.items.reduce((a, it) => a + it.cost * it.qty, 0), 0);
  const grossProfit = totalSales - totalCostOfSales;
  const netProfit = grossProfit - totalExpenses;
  const lowStock = MOCK_DB.batches.filter(b => b.remaining <= MOCK_DB.medicines.find(m => m.id === b.medicineId)?.minStock);
  const expiringSoon = MOCK_DB.batches.filter(b => b.remaining > 0 && daysUntilExpiry(b.expDate) <= 90 && daysUntilExpiry(b.expDate) > 0);
  const expiredBatches = MOCK_DB.batches.filter(b => b.remaining > 0 && daysUntilExpiry(b.expDate) <= 0);

            <tbody>

const BatchesPage = ({ showToast }) => {
  const [data, setData] = useState(MOCK_DB.batches);
  const [search, setSearch] = useState("");
  const [filter, setFilter] = useState("all");
  const today = new Date();

  const filtered = data.filter(b => {
    const matchSearch = b.medicineName.includes(search) || b.batchNo.includes(search);
    if (filter === "expiring") return matchSearch && daysUntilExpiry(b.expDate) <= 90 && daysUntilExpiry(b.expDate) > 0;
    if (filter === "expired") return matchSearch && daysUntilExpiry(b.expDate) <= 0;
    if (filter === "low") return matchSearch && b.remaining <= (MOCK_DB.medicines.find(m=>m.id===b.medicineId)?.minStock || 0);
    return matchSearch;
  });

  const getExpiryBadge = (expDate, remaining) => {
    if (remaining === 0) return <span className="badge badge-gray">نفذ</span>;
    const d = daysUntilExpiry(expDate);
    if (d <= 0) return <span className="badge badge-red">منتهي</span>;
    if (d <= 30) return <span className="badge badge-red">{d} يوم</span>;
    if (d <= 90) return <span className="badge badge-amber">{d} يوم</span>;
    return <span className="badge badge-green">سليم</span>;
  };

  return (
    <div>
      <div className="card">
        <div className="card-header">
          <div><div className="card-title">إدارة التشغيلات وتواريخ الصلاحية</div><div className="card-subtitle">{data.length} تشغيلة مسجلة</div></div>
          <div className="flex-row">
            <div className="search-bar"><Icon name="search" size={14} /><input placeholder="بحث..." value={search} onChange={e=>setSearch(e.target.value)} /></div>
          </div>
        </div>
        <div className="flex-row mb-16">
          {[["all","الكل"],["expiring","قريبة الانتهاء"],["expired","منتهية"],["low","ناقصة"]].map(([v,l])=>
            <button key={v} className={`btn ${filter===v?"btn-primary":"btn-secondary"} btn-sm`} onClick={()=>setFilter(v)}>{l}</button>
          )}
        </div>
        <div className="table-wrap">
          <table>
            <thead><tr><th>#</th><th>الدواء</th><th>رقم التشغيلة</th><th>المورد</th><th>الكمية الأصلية</th><th>المتبقي</th><th>سعر التكلفة</th><th>سعر البيع</th><th>تاريخ الإنتاج</th><th>تاريخ الانتهاء</th><th>الحالة</th></tr></thead>
            <tbody>
              {filtered.map((b, i) => (
                <tr key={b.id}>
                  <td className="mono-cell" style={{color:"var(--text-muted)"}}>{i+1}</td>
                  <td style={{fontWeight:600}}>{b.medicineName}</td>
                  <td className="mono-cell">{b.batchNo}</td>
                  <td>{b.supplierName}</td>
                  <td className="mono-cell">{b.qty}</td>
                  <td className="mono-cell" style={{color: b.remaining<=5?"var(--red)": b.remaining<=20?"var(--amber)":"var(--green)", fontWeight:700}}>{b.remaining}</td>
                  <td className="mono-cell">{formatCurrency(b.costPrice)}</td>
                  <td className="mono-cell">{formatCurrency(b.sellPrice)}</td>
                  <td>{formatDate(b.mfgDate)}</td>
                  <td>{formatDate(b.expDate)}</td>
                  <td>{getExpiryBadge(b.expDate, b.remaining)}</td>
                </tr>
              ))}
            </tbody>
          </table>
          {filtered.length === 0 && <div className="empty-state"><Icon name="batch" size={48} /><p>لا يوجد تشغيلات مطابقة</p></div>}
        </div>
      </div>
    </div>
  );
};

const SalesPage = ({ showToast }) => {
  const [data, setData] = useState(MOCK_DB.sales);
  const [showModal, setShowModal] = useState(false);
  const [viewInv, setViewInv] = useState(null);
  const [form, setForm] = useState({ customerId:"", customerName:"عميل نقدي", items:[], discount:0, paymentMethod:"نقدي", paid:0, notes:"" });
  const [itemForm, setItemForm] = useState({ medicineId:"", medicineName:"", batchId:"", qty:1, price:0, cost:0, discount:0 });
  const [search, setSearch] = useState("");

  const filtered = data.filter(s => s.invoiceNo.includes(search) || s.customerName.includes(search));

  const getNextInvoiceNo = () => `INV-2026-${String(MOCK_DB.sales.length + 1).padStart(3,"0")}`;

  const addItem = () => {
    if (!itemForm.medicineId || itemForm.qty <= 0) { showToast("اختر دواء وأدخل كمية", "error"); return; }
    const batch = MOCK_DB.batches.find(b => b.id === itemForm.batchId);
    if (batch && itemForm.qty > batch.remaining) { showToast(`الكمية المتاحة: ${batch.remaining}`, "error"); return; }
    setForm(prev => ({ ...prev, items: [...prev.items, {...itemForm, id: generateId()}] }));
    setItemForm({ medicineId:"", medicineName:"", batchId:"", qty:1, price:0, cost:0, discount:0 });
  };

  const removeItem = (id) => setForm(prev => ({ ...prev, items: prev.items.filter(i => i.id !== id) }));

  const subtotal = form.items.reduce((s, i) => s + (i.price * i.qty) - (i.discount || 0), 0);
  const total = subtotal - (+form.discount || 0);

  const handleSave = () => {
    if (form.items.length === 0) { showToast("أضف أصناف للفاتورة", "error"); return; }
    const inv = { id: generateId(), invoiceNo: getNextInvoiceNo(), ...form, discount: +form.discount, paid: +form.paid, subtotal, total, remaining: total - (+form.paid||0), status: total - (+form.paid||0) <= 0 ? "مكتملة" : "آجلة", createdAt: now(), createdBy: "admin" };
    MOCK_DB.sales.unshift(inv);
    MOCK_DB.auditLog.unshift({ id: generateId(), action: "بيع", description: `إنشاء فاتورة ${inv.invoiceNo}`, userId: "u1", userName: "مدير النظام", createdAt: now() });
    // update batch quantities
    form.items.forEach(item => {
      const bIdx = MOCK_DB.batches.findIndex(b => b.id === item.batchId);
      if (bIdx !== -1) MOCK_DB.batches[bIdx].remaining -= item.qty;
    });
    setData([...MOCK_DB.sales]);
    setShowModal(false);
    setForm({ customerId:"", customerName:"عميل نقدي", items:[], discount:0, paymentMethod:"نقدي", paid:0, notes:"" });
    showToast(`تم حفظ الفاتورة ${inv.invoiceNo}`, "success");
  };

  const handleMedicineSelect = (e) => {
    const med = MOCK_DB.medicines.find(m => m.id === e.target.value);
    if (!med) return;
    const batch = MOCK_DB.batches.find(b => b.medicineId === med.id && b.remaining > 0);
    setItemForm(prev => ({ ...prev, medicineId: med.id, medicineName: med.name, batchId: batch?.id || "", price: med.sellPrice, cost: med.costPrice }));
  };

  return (
    <div>
      <div className="card">
        <div className="card-header">
          <div><div className="card-title">فواتير المبيعات</div><div className="card-subtitle">{data.length} فاتورة</div></div>
          <div className="flex-row">
            <div className="search-bar"><Icon name="search" size={14} /><input placeholder="بحث..." value={search} onChange={e=>setSearch(e.target.value)} /></div>
            <button className="btn btn-primary" onClick={()=>setShowModal(true)}><Icon name="plus" size={16} />فاتورة جديدة</button>
          </div>
        </div>
        <div className="table-wrap">
          <table>
            <thead><tr><th>رقم الفاتورة</th><th>العميل</th><th>الإجمالي</th><th>المدفوع</th><th>المتبقي</th><th>طريقة الدفع</th><th>التاريخ</th><th>الحالة</th><th>إجراءات</th></tr></thead>
            <tbody>
              {filtered.map(s => (
                <tr key={s.id}>
                  <td className="mono-cell" style={{color:"var(--accent)",fontWeight:700}}>{s.invoiceNo}</td>
                  <td>{s.customerName}</td>
                  <td className="mono-cell" style={{color:"var(--green)",fontWeight:600}}>{formatCurrency(s.total)}</td>
                  <td className="mono-cell">{formatCurrency(s.paid)}</td>
                  <td className="mono-cell" style={{color: s.remaining > 0 ? "var(--amber)" : "var(--text-muted)"}}>{formatCurrency(s.remaining)}</td>
                  <td><span className="badge badge-blue">{s.paymentMethod}</span></td>
                  <td style={{color:"var(--text-secondary)",fontSize:"12px"}}>{formatDate(s.createdAt)}</td>
                  <td><span className={`badge badge-${s.status==="مكتملة"?"green":"amber"}`}>{s.status}</span></td>
                  <td><button className="btn btn-icon btn-secondary" onClick={()=>setViewInv(s)}><Icon name="print" size={14} /></button></td>
                </tr>
              ))}
            </tbody>
          </table>
          {filtered.length===0&&<div className="empty-state"><Icon name="cart" size={48} /><p>لا يوجد فواتير</p></div>}
        </div>
      </div>

      {/* New Sale Modal */}
      {showModal && (
        <div className="modal-overlay" onClick={e=>e.target===e.currentTarget&&setShowModal(false)}>
          <div className="modal modal-xl">
            <div className="modal-header"><div className="modal-title">فاتورة مبيعات جديدة</div><button className="btn btn-icon btn-secondary" onClick={()=>setShowModal(false)}><Icon name="close" size={16} /></button></div>
            <div className="modal-body">
              <div className="form-grid mb-16">
                <div className="form-group">
                  <label>العميل</label>
                  <select value={form.customerId} onChange={e=>{ const c=MOCK_DB.customers.find(x=>x.id===e.target.value); setForm({...form,customerId:e.target.value,customerName:c?c.name:"عميل نقدي"}); }}>
                    <option value="">عميل نقدي</option>
                    {MOCK_DB.customers.map(c=><option key={c.id} value={c.id}>{c.name}</option>)}
                  </select>
                </div>
                <div className="form-group">
                  <label>طريقة الدفع</label>
                  <select value={form.paymentMethod} onChange={e=>setForm({...form,paymentMethod:e.target.value})}>
                    <option>نقدي</option><option>تحويل</option><option>آجل</option><option>بطاقة</option>
                  </select>
                </div>
              </div>

              {/* Add Item Row */}
              <div className="card" style={{marginBottom:12,background:"var(--bg-hover)",border:"1px solid var(--border-light)"}}>
                <div style={{fontWeight:700,marginBottom:10,fontSize:13}}>إضافة صنف</div>
                <div style={{display:"grid",gridTemplateColumns:"2fr 1fr 1fr 1fr auto",gap:8,alignItems:"end"}}>
                  <div className="form-group" style={{marginBottom:0}}>

                  <div className="form-group" style={{marginBottom:0}}>

                <div style={{marginBottom:12}}>
                  <div className="invoice-items-header"><span>الدواء</span><span>الكمية</span><span>السعر</span><span>الخصم</span><span>الإجمالي</span><span></span></div>

const PurchasesPage = ({ showToast }) => {
  const [data, setData] = useState(MOCK_DB.purchases);
  const [showModal, setShowModal] = useState(false);
  const [form, setForm] = useState({ supplierId:"", supplierName:"", items:[], discount:0, paid:0, notes:"" });
  const [itemForm, setItemForm] = useState({ medicineId:"", medicineName:"", batchNo:"", qty:1, costPrice:0, expDate:"", mfgDate:"" });
  const [search, setSearch] = useState("");

  const filtered = data.filter(p => p.purchaseNo.includes(search) || p.supplierName.includes(search));

  const addItem = () => {
    if (!itemForm.medicineId || itemForm.qty <= 0) { showToast("اختر دواء وأدخل كمية", "error"); return; }
    setForm(prev => ({ ...prev, items: [...prev.items, {...itemForm, id: generateId(), total: itemForm.qty * itemForm.costPrice}] }));
    setItemForm({ medicineId:"", medicineName:"", batchNo:"", qty:1, costPrice:0, expDate:"", mfgDate:"" });
  };

  const subtotal = form.items.reduce((s, i) => s + i.total, 0);
  const total = subtotal - (+form.discount || 0);

  const handleSave = () => {
    if (!form.supplierId) { showToast("اختر المورد", "error"); return; }
    if (form.items.length === 0) { showToast("أضف أصناف للفاتورة", "error"); return; }
    const pur = { id: generateId(), purchaseNo: `PUR-2026-${String(MOCK_DB.purchases.length+1).padStart(3,"0")}`, ...form, subtotal, total, remaining: total - (+form.paid||0), status: "مستلمة", createdAt: now(), createdBy: "admin" };
    MOCK_DB.purchases.unshift(pur);
    // Add batches
    form.items.forEach(item => {
      MOCK_DB.batches.unshift({ id: generateId(), medicineId: item.medicineId, medicineName: item.medicineName, batchNo: item.batchNo || `BT${generateId().toUpperCase()}`, supplierId: form.supplierId, supplierName: form.supplierName, qty: item.qty, remaining: item.qty, costPrice: item.costPrice, sellPrice: MOCK_DB.medicines.find(m=>m.id===item.medicineId)?.sellPrice || 0, mfgDate: item.mfgDate, expDate: item.expDate, createdAt: now() });

    setShowModal(false);

            <tbody>
              {filtered.map(p => (
                <tr key={p.id}>
                  <td className="mono-cell" style={{color:"var(--blue)",fontWeight:700}}>{p.purchaseNo}</td>
                  <td>{p.supplierName}</td>
                  <td className="mono-cell" style={{color:"var(--red)",fontWeight:600}}>{formatCurrency(p.total)}</td>
                  <td className="mono-cell">{formatCurrency(p.paid)}</td>
                  <td className="mono-cell" style={{color: p.remaining > 0 ? "var(--amber)" : "var(--text-muted)"}}>{formatCurrency(p.remaining)}</td>
                  <td style={{color:"var(--text-secondary)",fontSize:12}}>{formatDate(p.createdAt)}</td>

      {showModal && (

            <div className="modal-header"><div className="modal-title">فاتورة شراء جديدة</div><button className="btn btn-icon btn-secondary" onClick={()=>setShowModal(false)}><Icon name="close" size={16} /></button></div>
            <div className="modal-body">

// INVENTORY PAGE

const InventoryPage = () => {
  const [search, setSearch] = useState("");
  const inventory = MOCK_DB.medicines.map(m => {
    const batches = MOCK_DB.batches.filter(b => b.medicineId === m.id);
    const totalQty = batches.reduce((s, b) => s + b.remaining, 0);
    const totalValue = batches.reduce((s, b) => s + b.remaining * b.costPrice, 0);
    const nearExpiry = batches.filter(b => b.remaining > 0 && daysUntilExpiry(b.expDate) <= 90 && daysUntilExpiry(b.expDate) > 0);
    return { ...m, totalQty, totalValue, batchCount: batches.length, nearExpiry: nearExpiry.length };
  }).filter(m => m.name.includes(search) || m.category.includes(search));

  const totalValue = inventory.reduce((s, m) => s + m.totalValue, 0);

  return (
    <div>
      <div className="stats-grid" style={{marginBottom:20}}>
        <div className="stat-card accent"><div className="stat-label">إجمالي الأصناف</div><div className="stat-value">{inventory.length}</div><div className="stat-icon"><Icon name="medicine" size={48}/></div></div>
        <div className="stat-card green"><div className="stat-label">قيمة المخزون الكلية</div><div className="stat-value mono">{formatCurrency(totalValue)}</div><div className="stat-icon"><Icon name="cash" size={48}/></div></div>
        <div className="stat-card red"><div className="stat-label">أصناف ناقصة</div><div className="stat-value">{inventory.filter(m=>m.totalQty<=m.minStock).length}</div><div className="stat-icon"><Icon name="warning" size={48}/></div></div>
        <div className="stat-card amber"><div className="stat-label">تشغيلات قريبة الانتهاء</div><div className="stat-value">{inventory.reduce((s,m)=>s+m.nearExpiry,0)}</div><div className="stat-icon"><Icon name="batch" size={48}/></div></div>
      </div>
      <div className="card">
        <div className="card-header">
          <div className="card-title">تقرير المخزون الحالي</div>
          <div className="flex-row">
            <div className="search-bar"><Icon name="search" size={14} /><input placeholder="بحث..." value={search} onChange={e=>setSearch(e.target.value)} /></div>
            <button className="btn btn-secondary" onClick={()=>{ const csv="الدواء,الفئة,الكمية,القيمة\n"+inventory.map(m=>`${m.name},${m.category},${m.totalQty},${m.totalValue.toFixed(2)}`).join("\n"); const a=document.createElement("a"); a.href="data:text/csv;charset=utf-8,\uFEFF"+encodeURIComponent(csv); a.download="inventory.csv"; a.click(); }}><Icon name="excel" size={16} />تصدير Excel</button>
          </div>
        </div>
        <div className="table-wrap">
          <table>
            <thead><tr><th>الدواء</th><th>الفئة</th><th>الكمية المتاحة</th><th>قيمة المخزون</th><th>عدد التشغيلات</th><th>تشغيلات قريبة الانتهاء</th><th>الحالة</th></tr></thead>
            <tbody>
              {inventory.map(m => (
                <tr key={m.id}>
                  <td style={{fontWeight:600}}>{m.name}</td>
                  <td><span className="badge badge-blue">{m.category}</span></td>
                  <td className="mono-cell" style={{color: m.totalQty<=m.minStock?"var(--red)":m.totalQty<=m.reorderLevel?"var(--amber)":"var(--green)", fontWeight:700}}>{m.totalQty}</td>
                  <td className="mono-cell">{formatCurrency(m.totalValue)}</td>
                  <td className="mono-cell">{m.batchCount}</td>
                  <td>{m.nearExpiry > 0 ? <span className="badge badge-amber">{m.nearExpiry} تشغيلة</span> : <span className="badge badge-gray">-</span>}</td>
                  <td>
                    {m.totalQty === 0 ? <span className="badge badge-red">نفذ</span> : m.totalQty <= m.minStock ? <span className="badge badge-red">حرج</span> : m.totalQty <= m.reorderLevel ? <span className="badge badge-amber">منخفض</span> : <span className="badge badge-green">جيد</span>}
                  </td>
                </tr>
              ))}
            </tbody>
          </table>
        </div>
      </div>
    </div>
  );
};

  const totalPurchases = MOCK_DB.purchases.reduce((s,p)=>s+p.total,0);

        <div className="stat-card amber"><div className="stat-label">هامش الربح الصافي</div><div className="stat-value">{totalSales>0?((netProfit/totalSales)*100).toFixed(1):0}%</div></div>

          <div className="card-title" style={{marginBottom:16}}>قائمة الدخل التفصيلية</div>

const ReportsPage = () => {
  const [activeReport, setActiveReport] = useState("sales");

  const exportCSV = (data, filename) => {
    const headers = Object.keys(data[0] || {}).join(",");
    const rows = data.map(d=>Object.values(d).map(v=>`"${v}"`).join(",")).join("\n");
    const csv = "\uFEFF" + headers + "\n" + rows;
    const a = document.createElement("a"); a.href="data:text/csv;charset=utf-8,"+encodeURIComponent(csv); a.download=filename+".csv"; a.click();
  };

  const salesReport = MOCK_DB.sales.map(s=>({ "رقم الفاتورة":s.invoiceNo,"العميل":s.customerName,"الإجمالي":s.total,"المدفوع":s.paid,"التاريخ":formatDate(s.createdAt),"الحالة":s.status }));
  const purchasesReport = MOCK_DB.purchases.map(p=>({ "رقم الفاتورة":p.purchaseNo,"المورد":p.supplierName,"الإجمالي":p.total,"المدفوع":p.paid,"التاريخ":formatDate(p.createdAt),"الحالة":p.status }));
  const inventoryReport = MOCK_DB.medicines.map(m=>{ const batches=MOCK_DB.batches.filter(b=>b.medicineId===m.id); const qty=batches.reduce((s,b)=>s+b.remaining,0); return {"الدواء":m.name,"الفئة":m.category,"الكمية":qty,"الحد الأدنى":m.minStock}; });

  const reports = { sales: salesReport, purchases: purchasesReport, inventory: inventoryReport };
  const reportNames = { sales:"تقرير المبيعات", purchases:"تقرير المشتريات", inventory:"تقرير المخزون" };

  return (
    <div>
      <div className="card">
        <div className="card-header">
          <div className="card-title">التقارير</div>
          <div className="flex-row">
            <button className="btn btn-secondary" onClick={()=>exportCSV(reports[activeReport], reportNames[activeReport])}><Icon name="excel" size={16}/>تصدير Excel</button>
            <button className="btn btn-secondary" onClick={()=>window.print()}><Icon name="print" size={16}/>طباعة</button>
          </div>
        </div>
        <div className="tabs">
          {Object.entries(reportNames).map(([k,v])=><div key={k} className={`tab ${activeReport===k?"active":""}`} onClick={()=>setActiveReport(k)}>{v}</div>)}
        </div>
        <div className="table-wrap">
          <table>
            <thead><tr>{Object.keys(reports[activeReport][0]||{}).map(h=><th key={h}>{h}</th>)}</tr></thead>
            <tbody>
              {reports[activeReport].map((row,i)=>(
                <tr key={i}>{Object.values(row).map((v,j)=><td key={j} className={typeof v==="number"?"mono-cell":""}>{typeof v==="number"?formatCurrency(v):v}</td>)}</tr>
              ))}
            </tbody>
          </table>
          {reports[activeReport].length===0&&<div className="empty-state"><Icon name="report" size={48}/><p>لا يوجد بيانات</p></div>}
        </div>
      </div>
    </div>
  );
};

// /batches/{id}            - التشغيلات
// /sales/{id}              - فواتير المبيعات
// /purchases/{id}          - فواتير المشتريات
// /suppliers/{id}          - الموردين
// /customers/{id}          - العملاء
// /expenses/{id}           - المصروفات
// /users/{id}              - المستخدمين
// /auditLog/{id}           - سجل العمليات
// /settings/{id}           - الإعدادات`}
        </div>

        <div style={{background:"var(--blue-dim)",border:"1px solid var(--blue)",borderRadius:8,padding:16,marginBottom:12}}>
          <div style={{fontWeight:700,color:"var(--blue)",marginBottom:8}}>📊 Indexes المطلوبة في Firestore:</div>
          <div style={{fontFamily:"JetBrains Mono,monospace",fontSize:12,color:"var(--text-primary)"}}>
{`batches: [medicineId ASC, expDate ASC]
batches: [supplierId ASC, createdAt DESC]  
sales: [customerId ASC, createdAt DESC]
sales: [status ASC, createdAt DESC]
purchases: [supplierId ASC, createdAt DESC]
expenses: [category ASC, date DESC]`}
          </div>
        </div>

        <div style={{background:"var(--green-dim)",border:"1px solid var(--green)",borderRadius:8,padding:16}}>
          <div style={{fontWeight:700,color:"var(--green)",marginBottom:8}}>⚡ Security Rules المقترحة:</div>
          <div style={{fontFamily:"JetBrains Mono,monospace",fontSize:12,color:"var(--text-primary)"}}>
{`rules_version = '2';
service cloud.firestore {
  match /databases/{database}/documents {
    match /{document=**} {
      allow read, write: if request.auth != null
        && get(/databases/$(database)/documents/users/$(request.auth.uid)).data.active == true;
    }
  }
}`}
          </div>
        </div>
      </div>
    </div>
  </div>
);

// ============================================================
// MAIN APP
// ============================================================
function PharmacyApp() {
  const [page, setPage] = useState("dashboard");
  const [sidebarOpen, setSidebarOpen] = useState(false);
  const [toasts, setToasts] = useState([]);

  const showToast = (message, type="success") => {
    const id = generateId();
    setToasts(prev => [...prev, { id, message, type }]);
    setTimeout(() => setToasts(prev => prev.filter(t => t.id !== id)), 3500);
  };

  const removeToast = (id) => setToasts(prev => prev.filter(t => t.id !== id));

  const navItems = [
    { section: "الرئيسية", items: [{ id:"dashboard", label:"لوحة التحكم", icon:"dashboard" }] },
    { section: "المخزون", items: [
      { id:"medicines", label:"الأدوية والأصناف", icon:"medicine" },
      { id:"batches", label:"التشغيلات", icon:"batch", badge: MOCK_DB.batches.filter(b=>b.remaining>0&&daysUntilExpiry(b.expDate)<=30&&daysUntilExpiry(b.expDate)>0).length || null },
      { id:"inventory", label:"المخزون والجرد", icon:"stock" },
    ]},
    { section: "المعاملات", items: [
      { id:"sales", label:"فواتير المبيعات", icon:"cart" },
      { id:"purchases", label:"فواتير المشتريات", icon:"purchase" },
      { id:"returns", label:"المرتجعات", icon:"return" },
    ]},
    { section: "الحسابات", items: [
      { id:"suppliers", label:"الموردين", icon:"supplier" },
      { id:"customers", label:"العملاء", icon:"customer" },
      { id:"cash", label:"الخزينة والمصروفات", icon:"cash" },
      { id:"profitloss", label:"الأرباح والخسائر", icon:"report" },
    ]},
    { section: "الإدارة", items: [
      { id:"reports", label:"التقارير", icon:"report" },
      { id:"users", label:"المستخدمين", icon:"users" },
      { id:"auditlog", label:"سجل العمليات", icon:"log" },
      { id:"firebase", label:"إعداد Firebase", icon:"log" },
    ]},
  ];

  const pageTitles = { dashboard:"لوحة التحكم", medicines:"الأدوية والأصناف", batches:"التشغيلات", inventory:"المخزون والجرد", sales:"فواتير المبيعات", purchases:"فواتير المشتريات", returns:"المرتجعات", suppliers:"الموردين", customers:"العملاء", cash:"الخزينة والمصروفات", profitloss:"الأرباح والخسائر", reports:"التقارير", users:"المستخدمين والصلاحيات", auditlog:"سجل العمليات", firebase:"إعداد Firebase" };

  const renderPage = () => {
    const props = { showToast };
    switch(page) {
      case "dashboard": return <Dashboard />;
      case "medicines": return <MedicinesPage {...props} />;
      case "batches": return <BatchesPage {...props} />;
      case "inventory": return <InventoryPage />;
      case "sales": return <SalesPage {...props} />;
      case "purchases": return <PurchasesPage {...props} />;
      case "returns": return <ReturnsPage {...props} />;
      case "suppliers": return <SuppliersPage {...props} />;
      case "customers": return <CustomersPage {...props} />;
      case "cash": return <CashPage {...props} />;
      case "profitloss": return <ProfitLossPage />;
      case "reports": return <ReportsPage />;
      case "users": return <UsersPage {...props} />;
      case "auditlog": return <AuditLogPage />;
      case "firebase": return <FirebaseSetupPage />;
      default: return <Dashboard />;
    }
  };

  return (
    <>
      <style dangerouslySetInnerHTML={{ __html: globalStyles }} />
      <div className="app">
        {/* Sidebar */}
        <nav className={`sidebar ${sidebarOpen?"open":""}`}>
          <div className="sidebar-logo">
            <div className="logo-icon">Rx</div>
            <div>
              <div className="logo-text">PharmaSys Pro</div>
              <div className="logo-sub">نظام إدارة الصيدلية</div>
            </div>
          </div>
          <div className="sidebar-nav">
            {navItems.map(section => (
              <div key={section.section} className="nav-section">
                <div className="nav-section-label">{section.section}</div>
                {section.items.map(item => (
                  <div key={item.id} className={`nav-item ${page===item.id?"active":""}`} onClick={()=>{ setPage(item.id); setSidebarOpen(false); }}>
                    <Icon name={item.icon} size={17} />
                    {item.label}
                    {item.badge ? <span className="nav-badge">{item.badge}</span> : null}
                  </div>
                ))}
              </div>
            ))}
          </div>
        </nav>

        {/* Mobile overlay */}
        {sidebarOpen && <div className="overlay" onClick={()=>setSidebarOpen(false)} style={{display:"block"}}/>}

        {/* Main */}
        <div className="main">
          <header className="topbar">
            <button className="menu-btn" onClick={()=>setSidebarOpen(!sidebarOpen)}>
              <Icon name="menu" size={20} />
            </button>
            <h1 className="page-title">{pageTitles[page]}</h1>
            <div className="topbar-actions">
              <div className="user-info">
                <div className="user-avatar">م</div>
                <span style={{fontSize:13,fontWeight:600,color:"var(--text-secondary)"}}>مدير النظام</span>
              </div>
            </div>
          </header>
          <main className="page-content">
            {renderPage()}
          </main>
        </div>
      </div>
      <ToastContainer toasts={toasts} removeToast={removeToast} />
    </>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<PharmacyApp />);

</script>
</body>
</html>
